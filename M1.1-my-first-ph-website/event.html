<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration From</title>
</head>

<body>
    <h1>Event Registration Form</h1>
    <p>
        This is an hackathon Resigtration Form. Fill up the below form so that host/moderators can contact with you.
    </p>
    <div>
        <form action="">
            <p>
                Write your Name:
                <input type="text" placeholder="Samiur Rahman" name="Name" id="Name">
            </p>
            <p>
                Write a valid e-mail address:
                <input type="email" placeholder="example@gmail.com" name="Email" id="email">
            </p>
            <p>
                Enter Your Gender here:
                <input type="radio" name="Gender" id="Male">
                <label for="Male">Male</label>
                <input type="radio" name="Gender" id="Female">
                <label for="Female">Female</label>
                <input type="radio" name="Gender" id="Mentally ill">
                <label for="Mentally ill">Meltally ill</label>
            </p>
            <p>
                Write your Mobile Number:
                <input type="number" placeholder="+88015XX-XXXXXX" name="Mobile" id="Mobile Number">
            </p>
            <p>
                Select your T-Shirt Size:
                <select name="T-Shirt Size" id="T-Shirt Size">
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </p>
            <input type="submit" name="Submit" id="Submit">
        </form>
    </div>
</body>

</html>
