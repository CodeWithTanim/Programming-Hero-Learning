<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics with Core Concepts</title>
    <style>
        p {
            color: burlywood;
        }

        .google {
            color: green;
        }

        h2 {
            color: darksalmon;
        }

        .subheading {
            color: darkorchid;
        }
    </style>
</head>

<body>
    <p style="color: blueviolet;">Lorem ipsum dolor sit amet.</p>
    <p style="color: coral;">Lorem ipsum dolor sit amet consectetur.</p>
    <p>Lorem ipsum dolor sit.</p>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing.</p>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Laborum!</p>
    <h1>This is a heading</h1>
    <h2>This is a subheading</h2>
    <h2 class="subheading">This is another subheading</h2>
    <a class="google" href="https://www.google.com/">Google</a>
    <a href="https://www.github.com">GitHub</a>
</body>

</html>
